<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeenDesh - Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="theme-toggle" class="corner-btn" title="Toggle Theme">🌙</button>
    <a href="profile.html" id="profile-btn" class="corner-btn" title="Profile">👤</a>

    <div class="online-status">
        <div class="status-dot"></div>
        <span id="user-count">0 Online</span>
    </div>

    <div class="star-container">
        <div class="star-layer stars1"></div>
        <div class="star-layer stars2"></div>
    </div>

    <div class="content">
        <h1>TeenDesh</h1>
        <button class="among-us-btn" id="summon-btn">Summon Partner</button>
        <h2 class="about-heading">About TeenDesh</h2>
        <p class="about-text">TeenDesh is a space for teens to connect, chat, and make friends anonymously. Jump into a 1vs1 chat or explore the station.</p>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
